<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        font-size: 13px;
        color: #202124;
      }

      body {
        margin: 0;
        padding: 14px;
        background: #fff;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .controls {
        display: grid;
        gap: 10px;
        margin-bottom: 12px;
      }

      label {
        display: grid;
        gap: 4px;
        font-weight: 600;
      }

      select,
      button {
        border: 1px solid #dadce0;
        border-radius: 4px;
        padding: 7px 8px;
        background: #fff;
        font: inherit;
      }

      button {
        cursor: pointer;
        font-weight: 700;
      }

      .task {
        border: 1px solid #dadce0;
        border-radius: 6px;
        padding: 10px;
        margin-bottom: 8px;
        background: #fff;
      }

      .task-title {
        font-weight: 700;
        margin-bottom: 4px;
      }

      .meta {
        color: #5f6368;
        line-height: 1.45;
      }

      .summary {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 8px 0 12px;
      }

      .pill {
        border: 1px solid #dadce0;
        border-radius: 999px;
        padding: 4px 8px;
        background: #f8fafd;
        color: #3c4043;
        font-size: 12px;
      }

      .pill.warning {
        border-color: #fbbc04;
        background: #fff8e1;
      }

      .pill.danger {
        border-color: #f28b82;
        background: #fce8e6;
      }

      .task-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }

      .task-actions button {
        padding: 6px 8px;
        font-size: 12px;
      }

      .status {
        margin: 10px 0;
        min-height: 18px;
      }

      .error {
        color: #b3261e;
      }
    </style>
  </head>
  <body>
    <h1>My Task Queue</h1>
    <div class="controls">
      <label>
        User
        <select id="user"></select>
      </label>
      <button type="button" onclick="loadQueue()">Refresh</button>
    </div>
    <div id="status" class="status">Loading...</div>
    <div id="summary" class="summary"></div>
    <div id="tasks"></div>

    <script>
      function setStatus(message, type) {
        const status = document.getElementById('status');
        status.textContent = message || '';
        status.className = `status ${type || ''}`;
      }

      function fillSelect(id, options, selectedValue) {
        const select = document.getElementById(id);
        select.innerHTML = options.map((option) => {
          const selected = option === selectedValue ? ' selected' : '';
          return `<option value="${escapeAttr(option)}"${selected}>${escapeHtml(option)}</option>`;
        }).join('');
      }

      function loadQueue() {
        const user = document.getElementById('user').value;
        setStatus('Loading...', '');
        google.script.run
          .withSuccessHandler(renderTasks)
          .withFailureHandler((error) => {
            setStatus(error && error.message ? error.message : String(error), 'error');
          })
          .getTaskQueue(user);
      }

      function renderTasks(payload) {
        const tasks = Array.isArray(payload) ? payload : (payload.tasks || []);
        const summary = Array.isArray(payload) ? null : payload.summary;
        const container = document.getElementById('tasks');
        renderSummary(summary);
        setStatus(`${tasks.length} active task(s)`, '');
        container.innerHTML = tasks.map((task) => `
          <div class="task">
            <div class="task-title">#${escapeHtml(task.contentId)} ${escapeHtml(task.idea || '')}</div>
            <div class="meta">
              ${renderTaskLabels(task)}
              Status: ${escapeHtml(task.status || '')}<br>
              Owner: ${escapeHtml(task.currentOwner || '')}<br>
              Filmer: ${escapeHtml(task['Assigned Filmer(s)'] || '')}<br>
              Film: ${escapeHtml(task['Filming Date'] || '')}<br>
              Post: ${escapeHtml(task['Posting Date'] || '')} ${escapeHtml(task.Time || '')}
              ${renderRevisionMeta(task)}
              ${renderSchedulingMeta(task)}
            </div>
            ${renderActions(task)}
          </div>
        `).join('');
      }

      function renderSummary(summary) {
        const container = document.getElementById('summary');
        if (!summary) {
          container.innerHTML = '';
          return;
        }

        const pills = [`${summary.total || 0} active`];
        Object.keys(summary.byStatus || {}).forEach((status) => {
          pills.push(`${status}: ${summary.byStatus[status]}`);
        });
        Object.keys(summary.byOwner || {}).forEach((owner) => {
          pills.push(`${owner}: ${summary.byOwner[owner]}`);
        });

        container.innerHTML = `
          ${pills.map((pill) => `<span class="pill">${escapeHtml(pill)}</span>`).join('')}
          ${(summary.overdue || 0) ? `<span class="pill warning">${escapeHtml(summary.overdue)} overdue</span>` : ''}
          ${(summary.blocked || 0) ? `<span class="pill danger">${escapeHtml(summary.blocked)} blocked</span>` : ''}
        `;
      }

      function renderTaskLabels(task) {
        const labels = [];
        if (task.isOverdue && task.overdueLabel) {
          labels.push(`<span class="pill warning">${escapeHtml(task.overdueLabel)}</span>`);
        }
        if (task.isBlocked) {
          const blocker = task.blockerIssue ? `Blocked: ${task.blockerIssue}` : 'Blocked';
          labels.push(`<span class="pill danger">${escapeHtml(blocker)}</span>`);
        }
        return labels.length ? `${labels.join('')}<br>` : '';
      }

      function renderRevisionMeta(task) {
        const lines = [];
        if (task.latestVersion) lines.push(`Version: V${escapeHtml(task.latestVersion)}`);
        if (task.latestEditedUrl) lines.push(`Latest edit: ${escapeHtml(task.latestEditedUrl)}`);
        if (task.status === 'Revision Requested' && task.brandManagerFeedback) lines.push(`Brand Manager feedback: ${escapeHtml(task.brandManagerFeedback)}`);
        if (task.editorNotes) lines.push(`Editor notes: ${escapeHtml(task.editorNotes)}`);
        return lines.length ? `<br>${lines.join('<br>')}` : '';
      }

      function renderSchedulingMeta(task) {
        const lines = [];
        if (task.finalApprovedVideoUrl) lines.push(`Final video: ${escapeHtml(task.finalApprovedVideoUrl)}`);
        if (task.platforms) lines.push(`Platform(s): ${escapeHtml(task.platforms)}`);
        if (task.schedulingReadiness && task.schedulingReadiness.missing && task.schedulingReadiness.missing.length) {
          lines.push(`Missing: ${escapeHtml(task.schedulingReadiness.missing.join(', '))}`);
        }
        if (task.postingContext && task.postingContext.captionPreview) {
          lines.push(`Caption: ${escapeHtml(task.postingContext.captionPreview)}`);
        }
        return lines.length ? `<br>${lines.join('<br>')}` : '';
      }

      function renderActions(task) {
        const actions = task.availableActions || [];
        if (!actions.length) {
          return '';
        }

        return `
          <div class="task-actions">
            ${actions.map((item) => `
              <button type="button" onclick="openTaskAction('${escapeAttr(item.action)}', '${escapeAttr(task.contentId)}')">
                ${escapeHtml(item.label)}
              </button>
            `).join('')}
          </div>
        `;
      }

      function openTaskAction(action, contentId) {
        setStatus('Opening action...', '');
        google.script.run
          .withSuccessHandler(() => {
            setStatus('Action opened.', '');
          })
          .withFailureHandler((error) => {
            setStatus(error && error.message ? error.message : String(error), 'error');
          })
          .openWorkflowDialogForTask(action, contentId);
      }

      function escapeHtml(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/`/g, '&#96;');
      }

      google.script.run
        .withSuccessHandler((model) => {
          fillSelect('user', model.users, model.defaultUser);
          loadQueue();
        })
        .withFailureHandler((error) => {
          setStatus(error && error.message ? error.message : String(error), 'error');
        })
        .getTaskQueueModel();
    </script>
  </body>
</html>
