<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        font-size: 14px;
        color: #202124;
      }

      body {
        margin: 0;
        padding: 18px;
        background: #fff;
      }

      h1 {
        margin: 0 0 14px;
        font-size: 18px;
        font-weight: 700;
      }

      .context {
        display: none;
        margin: 0 0 14px;
        padding: 10px 12px;
        border: 1px solid #dadce0;
        border-radius: 6px;
        background: #f8fafd;
        line-height: 1.45;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 5px;
        font-weight: 600;
      }

      input,
      select,
      textarea {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #dadce0;
        border-radius: 4px;
        padding: 8px 9px;
        font: inherit;
      }

      textarea {
        min-height: 74px;
        resize: vertical;
      }

      .checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
      }

      .checkbox input {
        width: auto;
      }

      .required {
        color: #b3261e;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 8px;
      }

      button {
        border: 1px solid #dadce0;
        border-radius: 4px;
        padding: 8px 12px;
        background: #fff;
        color: #202124;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
      }

      button.primary {
        border-color: #1a73e8;
        background: #1a73e8;
        color: #fff;
      }

      button:disabled {
        cursor: default;
        opacity: 0.65;
      }

      .status {
        min-height: 20px;
        margin-top: 12px;
        line-height: 1.4;
      }

      .error {
        color: #b3261e;
      }

      .success {
        color: #137333;
      }
    </style>
  </head>
  <body>
    <h1 id="title">Content Workflow</h1>
    <div id="context" class="context"></div>
    <form id="workflow-form"></form>
    <div id="status" class="status"></div>

    <script>
      const action = '<?= action ?>';
      const prefillContentId = '<?= prefillContentId ?>';
      let model = null;

      function setStatus(message, type) {
        const status = document.getElementById('status');
        status.textContent = message || '';
        status.className = `status ${type || ''}`;
      }

      function renderContext() {
        const context = document.getElementById('context');
        const lines = [];

        if (model.selectedContent && model.selectedContent.contentId) {
          lines.push(`Selected content: #${model.selectedContent.contentId}`);
          if (model.selectedContent.idea) lines.push(model.selectedContent.idea);
          if (model.selectedContent.status) lines.push(`Status: ${model.selectedContent.status}`);
        }

        if (model.selectedIdea && model.selectedIdea.row) {
          lines.push(`Selected idea row: ${model.selectedIdea.row}`);
          if (model.selectedIdea.ideaTitle) lines.push(model.selectedIdea.ideaTitle);
        }

        (model.contextLines || []).forEach((line) => lines.push(line));

        if (!lines.length) {
          context.style.display = 'none';
          return;
        }

        context.innerHTML = lines.map(escapeHtml).join('<br>');
        context.style.display = 'block';
      }

      function renderField(field) {
        const value = model.defaults[field.name] || '';
        const required = field.required ? ' required' : '';
        const requiredMark = field.required ? ' <span class="required">*</span>' : '';

        if (field.type === 'checkbox') {
          return `
            <label class="checkbox">
              <input type="checkbox" name="${field.name}" value="true"${required}>
              <span>${escapeHtml(field.label)}${requiredMark}</span>
            </label>
          `;
        }

        if (field.type === 'textarea') {
          return `
            <label>
              <span>${escapeHtml(field.label)}${requiredMark}</span>
              <textarea name="${field.name}"${required}>${escapeHtml(value)}</textarea>
            </label>
          `;
        }

        if (field.type === 'select') {
          const options = model.options[field.optionsKey] || [];
          const optionHtml = ['<option value=""></option>'].concat(options.map((option) => {
            const selected = String(option) === String(value) ? ' selected' : '';
            return `<option value="${escapeAttr(option)}"${selected}>${escapeHtml(option)}</option>`;
          })).join('');
          return `
            <label>
              <span>${escapeHtml(field.label)}${requiredMark}</span>
              <select name="${field.name}"${required}>${optionHtml}</select>
            </label>
          `;
        }

        return `
          <label>
            <span>${escapeHtml(field.label)}${requiredMark}</span>
            <input type="${field.type}" name="${field.name}" value="${escapeAttr(value)}"${required}>
          </label>
        `;
      }

      function renderForm() {
        document.getElementById('title').textContent = model.title;
        renderContext();

        const form = document.getElementById('workflow-form');
        form.innerHTML = model.fields.map(renderField).join('') + `
          <div class="actions">
            <button type="button" onclick="google.script.host.close()">Cancel</button>
            <button class="primary" type="submit">${escapeHtml(model.submitLabel)}</button>
          </div>
        `;
        form.addEventListener('submit', handleSubmit);
      }

      function handleSubmit(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const submitButton = form.querySelector('button[type="submit"]');
        const payload = {};

        model.fields.forEach((field) => {
          const input = form.elements[field.name];
          payload[field.name] = field.type === 'checkbox' ? String(Boolean(input && input.checked)) : (input ? input.value : '');
        });

        submitButton.disabled = true;
        setStatus('Saving...', '');
        google.script.run
          .withSuccessHandler((result) => {
            setStatus(result && result.message ? result.message : 'Saved.', 'success');
            setTimeout(() => google.script.host.close(), 900);
          })
          .withFailureHandler((error) => {
            submitButton.disabled = false;
            setStatus(error && error.message ? error.message : String(error), 'error');
          })
          .submitWorkflowDialog(action, payload);
      }

      function escapeHtml(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/`/g, '&#96;');
      }

      setStatus('Loading...', '');
      google.script.run
        .withSuccessHandler((response) => {
          model = response;
          setStatus('', '');
          renderForm();
        })
        .withFailureHandler((error) => {
          setStatus(error && error.message ? error.message : String(error), 'error');
        })
        .getWorkflowDialogModel(action, prefillContentId);
    </script>
  </body>
</html>
